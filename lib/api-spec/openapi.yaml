openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Arc Network Token Swap DApp API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: swap
    description: Token swap operations
  - name: wallet
    description: Wallet balance operations
  - name: fees
    description: Platform fee earnings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /swap/estimate:
    post:
      operationId: estimateSwap
      tags: [swap]
      summary: Estimate swap rate
      description: Get a pre-swap estimate before executing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwapRequest"
      responses:
        "200":
          description: Swap estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SwapEstimate"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wallet/balances:
    get:
      operationId: getWalletBalances
      tags: [wallet]
      summary: Get wallet token balances
      description: Returns USDC, EURC, and cirBTC balances. If address is provided, fetches balances for that address; otherwise uses the configured backend wallet.
      parameters:
        - name: address
          in: query
          required: false
          schema:
            type: string
          description: EVM wallet address to fetch balances for (0x...)
      responses:
        "200":
          description: Wallet balances
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletBalances"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /swap/history:
    get:
      operationId: getSwapHistory
      tags: [swap]
      summary: Get recent swap history
      description: Returns the list of recent swaps executed
      responses:
        "200":
          description: Swap history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SwapHistory"

  /fees:
    get:
      operationId: getFeeEarnings
      tags: [fees]
      summary: Get platform fee earnings
      description: Returns accumulated platform fee totals and recent fee events
      responses:
        "200":
          description: Fee earnings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeeEarnings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SwapRequest:
      type: object
      properties:
        tokenIn:
          type: string
          enum: [USDC, EURC, cirBTC]
          description: Token to swap from
        tokenOut:
          type: string
          enum: [USDC, EURC, cirBTC]
          description: Token to swap to
        amountIn:
          type: string
          description: Human-readable amount to swap (e.g. "1.00")
      required:
        - tokenIn
        - tokenOut
        - amountIn

    SwapEstimate:
      type: object
      properties:
        tokenIn:
          type: string
        tokenOut:
          type: string
        amountIn:
          type: string
        effectiveAmountIn:
          type: string
          description: Amount actually swapped after platform fee deduction
        estimatedAmountOut:
          type: string
        exchangeRate:
          type: string
        fee:
          type: string
        platformFee:
          type: string
          description: Platform fee deducted from amountIn (0.3%)
        platformFeeAddress:
          type: string
          description: Wallet address that receives the platform fee
        priceImpact:
          type: string
          description: Estimated price impact as a percentage
      required:
        - tokenIn
        - tokenOut
        - amountIn
        - effectiveAmountIn
        - estimatedAmountOut
        - exchangeRate
        - fee
        - platformFee
        - platformFeeAddress
        - priceImpact

    SwapResult:
      type: object
      properties:
        success:
          type: boolean
        transactionHash:
          type: string
        explorerUrl:
          type: string
        tokenIn:
          type: string
        tokenOut:
          type: string
        amountIn:
          type: string
        amountOut:
          type: string
        timestamp:
          type: string
      required:
        - success
        - transactionHash
        - explorerUrl
        - tokenIn
        - tokenOut
        - amountIn
        - amountOut
        - timestamp

    WalletBalances:
      type: object
      properties:
        address:
          type: string
        balances:
          type: array
          items:
            $ref: "#/components/schemas/TokenBalance"
        network:
          type: string
      required:
        - address
        - balances
        - network

    TokenBalance:
      type: object
      properties:
        token:
          type: string
        balance:
          type: string
        symbol:
          type: string
      required:
        - token
        - balance
        - symbol

    SwapHistory:
      type: object
      properties:
        swaps:
          type: array
          items:
            $ref: "#/components/schemas/SwapResult"
      required:
        - swaps

    FeeEarnings:
      type: object
      properties:
        totals:
          type: array
          items:
            $ref: "#/components/schemas/FeeTotalByToken"
        recent:
          type: array
          items:
            $ref: "#/components/schemas/FeeEvent"
      required:
        - totals
        - recent

    FeeTotalByToken:
      type: object
      properties:
        token:
          type: string
        totalFee:
          type: string
        eventCount:
          type: number
      required:
        - token
        - totalFee
        - eventCount

    FeeEvent:
      type: object
      properties:
        id:
          type: number
        token:
          type: string
        feeAmount:
          type: string
        transactionHash:
          type: string
        swapAmountIn:
          type: string
        createdAt:
          type: string
      required:
        - id
        - token
        - feeAmount
        - transactionHash
        - swapAmountIn
        - createdAt

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: string
      required:
        - error
